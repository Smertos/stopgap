services:
  stopgap-postgres:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: stopgap-postgres-local:pg17
    container_name: stopgap-postgres-local
    environment:
      POSTGRES_USER: stopgap
      POSTGRES_PASSWORD: stopgap
      POSTGRES_DB: stopgap
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - stopgap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  stopgap_pgdata:
