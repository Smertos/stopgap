name: Release Extensions

on:
  push:
    tags:
      - 'ext-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to cut the extensions release from
        required: true
        default: main
        type: string

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-extensions
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare extensions release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      release_ref: ${{ steps.prepare.outputs.release_ref }}
    steps:
      - if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate release branch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          REF="${{ inputs.ref }}"
          git check-ref-format --branch "${REF}"
          git fetch --no-tags origin "refs/heads/${REF}:refs/remotes/origin/${REF}"
          git show-ref --verify --quiet "refs/remotes/origin/${REF}"

      - name: Checkout release branch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          REF="${{ inputs.ref }}"
          git checkout -B release-cut "refs/remotes/origin/${REF}"

      - name: Prepare release metadata
        id: prepare
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="$(scripts/release-version.sh next extensions)"
            TAG_NAME="ext-v${VERSION}"

            scripts/release-version.sh apply extensions "${VERSION}"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock crates/common/Cargo.toml crates/plts/Cargo.toml crates/stopgap/Cargo.toml packages/runtime/package.json
            if git diff --cached --quiet; then
              echo "No version changes detected after applying ${VERSION}" >&2
              exit 1
            fi
            git commit -m "release(extensions): cut v${VERSION}"
            git tag -a "${TAG_NAME}" -m "Extensions ${TAG_NAME}"
            git push --atomic origin "HEAD:${{ inputs.ref }}" "${TAG_NAME}"
            echo "Released ${TAG_NAME} from branch ${{ inputs.ref }}" >> "${GITHUB_STEP_SUMMARY}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#ext-v}"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_ref=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

  build-extensions:
    name: Build extensions for PG ${{ matrix.pg_version }}
    needs: prepare-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pg_version: 17
            pg_package: postgresql-17
          - pg_version: 18
            pg_package: postgresql-18
    env:
      PGRX_HOME: ${{ github.workspace }}/.pgrx
      PGRX_DEFAULT_PG_VERSION: ${{ matrix.pg_version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: packages/runtime/pnpm-lock.yaml

      - name: Install runtime package dependencies
        run: pnpm --dir packages/runtime install --frozen-lockfile

      - name: Build embedded runtime artifact
        run: pnpm --dir packages/runtime run build

      - name: Install PostgreSQL ${{ matrix.pg_version }} development packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor | sudo tee /etc/apt/keyrings/postgresql.gpg > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pg_package }} postgresql-server-dev-${{ matrix.pg_version }}

      - name: Allow extension install writes
        run: |
          sudo chown -R "$USER":"$USER" /usr/lib/postgresql/${{ matrix.pg_version }}/lib /usr/share/postgresql/${{ matrix.pg_version }}/extension

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize cargo-pgrx
        run: cargo pgrx init --pg${{ matrix.pg_version }} /usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config

      - name: Build and install plts with V8 runtime
        run: cargo pgrx install -p plts --release --pg-config /usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config --no-default-features --features "pg${{ matrix.pg_version }},v8_runtime"

      - name: Build and install stopgap extension
        run: cargo pgrx install -p stopgap --release --pg-config /usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config --no-default-features --features pg${{ matrix.pg_version }}

      - name: Package extensions
        run: |
          mkdir -p release-pg${{ matrix.pg_version }}
          
          # Package plts (V8 runtime)
          cp /usr/lib/postgresql/${{ matrix.pg_version }}/lib/plts.so release-pg${{ matrix.pg_version }}/
          cp /usr/share/postgresql/${{ matrix.pg_version }}/extension/plts*.sql release-pg${{ matrix.pg_version }}/ 2>/dev/null || true
          cp /usr/share/postgresql/${{ matrix.pg_version }}/extension/plts.control release-pg${{ matrix.pg_version }}/ 2>/dev/null || true
          
          # Package stopgap
          cp /usr/lib/postgresql/${{ matrix.pg_version }}/lib/stopgap.so release-pg${{ matrix.pg_version }}/
          cp /usr/share/postgresql/${{ matrix.pg_version }}/extension/stopgap*.sql release-pg${{ matrix.pg_version }}/ 2>/dev/null || true
          cp /usr/share/postgresql/${{ matrix.pg_version }}/extension/stopgap.control release-pg${{ matrix.pg_version }}/ 2>/dev/null || true
          
          cd release-pg${{ matrix.pg_version }} && zip -r ../stopgap-extensions-pg${{ matrix.pg_version }}.zip .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extensions-pg${{ matrix.pg_version }}
          path: stopgap-extensions-pg${{ matrix.pg_version }}.zip
          retention-days: 5

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-extensions
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: artifacts/**/*.zip
          generate_release_notes: true
          name: Extensions ${{ needs.prepare-release.outputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
