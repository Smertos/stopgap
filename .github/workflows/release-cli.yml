name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to cut the CLI release from
        required: true
        default: main
        type: string

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-cli
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare CLI release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      release_ref: ${{ steps.prepare.outputs.release_ref }}
    steps:
      - if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate release branch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          REF="${{ inputs.ref }}"
          git check-ref-format --branch "${REF}"
          git fetch --no-tags origin "refs/heads/${REF}:refs/remotes/origin/${REF}"
          git show-ref --verify --quiet "refs/remotes/origin/${REF}"

      - name: Checkout release branch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          REF="${{ inputs.ref }}"
          git checkout -B release-cut "refs/remotes/origin/${REF}"

      - name: Prepare release metadata
        id: prepare
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="$(scripts/release-version.sh next cli)"
            TAG_NAME="cli-v${VERSION}"

            scripts/release-version.sh apply cli "${VERSION}"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock crates/stopgap-cli/Cargo.toml
            if git diff --cached --quiet; then
              echo "No version changes detected after applying ${VERSION}" >&2
              exit 1
            fi
            git commit -m "release(cli): cut v${VERSION}"
            git tag -a "${TAG_NAME}" -m "CLI ${TAG_NAME}"
            git push --atomic origin "HEAD:${{ inputs.ref }}" "${TAG_NAME}"
            echo "Released ${TAG_NAME} from branch ${{ inputs.ref }}" >> "${GITHUB_STEP_SUMMARY}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#cli-v}"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_ref=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

  build-cli:
    name: Build CLI for ${{ matrix.target }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build -p stopgap-cli --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=${{ needs.prepare-release.outputs.version }}
          mkdir -p "release/stopgap-${{ matrix.target }}-v${VERSION}"
          cp target/${{ matrix.target }}/release/stopgap "release/stopgap-${{ matrix.target }}-v${VERSION}/stopgap"
          cd release
          tar -czvf "../stopgap-${{ matrix.target }}-v${VERSION}.tgz" "stopgap-${{ matrix.target }}-v${VERSION}"

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare-release.outputs.version }}"
          $dir = "release/stopgap-${{ matrix.target }}-v$version"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/stopgap.exe" "$dir/stopgap.exe"
          Compress-Archive -Path $dir -DestinationPath "stopgap-${{ matrix.target }}-v$version.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            stopgap-${{ matrix.target }}-v*.tgz
            stopgap-${{ matrix.target }}-v*.zip
          retention-days: 5

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-cli
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-files
          
          for dir in artifacts/cli-*; do
            for file in "$dir"/*; do
              if [ -f "$file" ]; then
                cp "$file" release-files/
              fi
            done
          done
          
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: release-files/*
          generate_release_notes: true
          name: CLI ${{ needs.prepare-release.outputs.tag_name }}
          body: |
            ## Installation
            
            ### With cargo-binstall (recommended)
            ```bash
            cargo binstall stopgap
            ```
            
            ### Manual
            Download the appropriate binary for your platform from the assets below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish stopgap-cli crate
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-cli
      - create-release
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1

      - name: Publish stopgap-cli to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p stopgap-cli --locked
