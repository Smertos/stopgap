name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI for ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
          targets: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_OUTPUT

      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build -p stopgap-cli --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p "release/stopgap-${{ matrix.target }}-v${VERSION}"
          cp target/${{ matrix.target }}/release/stopgap "release/stopgap-${{ matrix.target }}-v${VERSION}/stopgap"
          cd release
          tar -czvf "../stopgap-${{ matrix.target }}-v${VERSION}.tgz" "stopgap-${{ matrix.target }}-v${VERSION}"

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $dir = "release/stopgap-${{ matrix.target }}-v$version"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/stopgap.exe" "$dir/stopgap.exe"
          Compress-Archive -Path $dir -DestinationPath "stopgap-${{ matrix.target }}-v$version.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            stopgap-${{ matrix.target }}-v*.tgz
            stopgap-${{ matrix.target }}-v*.zip
          retention-days: 5

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-cli
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-files
          
          for dir in artifacts/cli-*; do
            for file in "$dir"/*; do
              if [ -f "$file" ]; then
                cp "$file" release-files/
              fi
            done
          done
          
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          name: CLI ${{ github.ref_name }}
          body: |
            ## Installation
            
            ### With cargo-binstall (recommended)
            ```bash
            cargo binstall stopgap
            ```
            
            ### Manual
            Download the appropriate binary for your platform from the assets below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
